<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>???</title>
    <script src="script.js" defer></script>
    <script src="dialogue.js"></script>
    <script src="gear.js"></script>
    <script src="player.js"></script>
    <script src="events.js" defer></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div>
        <div id="top-bar">
            <div id="steps-display" class="inline card">
                <p>Steps Taken: </p>
                <p id="steps">0</p>
            </div>
            <div id="health-display" class="inline card">
                <p id="health"></p>
                <img src="images/main-icons/heart.png" alt="health icon" id="heart-icon" />
            </div>
        </div>
        <div class="horizontal-flex">
            <div id="narration-box">
                <p id="narration-text"></p>
            </div>
            <div id="inventory-box">
                <h2>Inventory</h2>
                <div class="inventory-display">
                    <p>Head:</p>
                    <div class="inline">
                        <p id="head-equipped">Empty</p>
                        <img src="images/gear/no-helmet-edit.png" class="gear-icons" id="helmet-icon">
                    </div>
                </div>
                <div class="inventory-display">
                    <p>Body:</p>
                    <div class="inline">
                        <p id="body-equipped">Muddy Clothes</p>
                        <img src="images/gear/muddy-shirt-edit.png" class="gear-icons" id="body-icon">
                    </div>

                </div>
                <div class="inventory-display">
                    <p>Feet:</p>
                    <div class="inline">
                        <p id="feet-equipped">Split Shoes</p>
                        <img src="images/gear/damaged-boot-edit.png" class="gear-icons" id="shoe-icon">
                    </div>
                </div>
                <div class="inventory-display">
                    <p>Equipped:</p>
                    <div class="inline">
                        <p id="equipped">Empty</p>
                        <img src="images/gear/empty-symbol.png" class="gear-icons" id="equipped-icon">
                    </div>
                </div>
                <p>Inventory:</p>
                <p id="inventory-list"></p>
            </div>
        </div>
        <div id="button-bar">

        </div>
        <div>
            <button id="step-button">Take a Step</button>
        </div>
        <div id="animation-bar">
            <img id="running-figure" src="images/figure-running/1.png">
            <img id="running-monster" src="images/monster-running/1.png">
        </div>
    </div>
    <a href="sources.html"> Art sources</a>
    <button id="restart-button">Restart</button>
</body>

</html>
